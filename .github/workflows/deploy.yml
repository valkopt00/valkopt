name: Atualizar JSON de Notícias e Deploy Firebase
on:
  schedule:
    - cron: "*/15 * * * *"  # Executa a cada 15 minutos
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4
        
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Instalar dependências
        run: pip install -r requirements.txt
        
      - name: Executar script para atualizar JSON
        run: |
            export PYTHONPATH=$(pwd)
            python scripts/RSS_API.py
        
      - name: Copiar ficheiros JSON para pasta public
        run: |
          cp articles/articles.json public/articles.json
          cp articles/articles_priority.json public/articles_priority.json
          cp articles/articles_secondary.json public/articles_secondary.json
        
      #- name: Reset counts with backup
      #  run: python reset_counts_with_backup.py
      
      - name: Commit dos ficheiros atualizados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/articles.json articles/articles_priority.json articles/articles_secondary.json articles/original_categories.json public/articles.json public/articles_priority.json public/articles_secondary.json
          git diff --cached --quiet || git commit -m "Atualização automática dos ficheiros JSON"
          git push --force origin main

  deploy-firebase:
    needs: update-json
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4
              
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
                
      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools
        
      - name: Adicionar timestamp aos ficheiros JSON
        run: |
          TIMESTAMP=$(date +%s)
          cd public
          
          # Criar versões com timestamp para forçar refresh do cache
          if [ -f "articles_priority.json" ]; then
            cp articles_priority.json "articles_priority_${TIMESTAMP}.json"
          fi
          
          if [ -f "articles_secondary.json" ]; then
            cp articles_secondary.json "articles_secondary_${TIMESTAMP}.json"
          fi
          
          if [ -f "articles.json" ]; then
            cp articles.json "articles_${TIMESTAMP}.json"
          fi
          
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
              
      - name: Deploy para Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_DEPLOY_TOKEN }}
        run: firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --token "$FIREBASE_TOKEN"
        
      - name: Aguardar propagação inicial
        run: |
          echo "Aguardando propagação inicial do CDN..."
          sleep 15
      
      - name: Warm up Firebase CDN cache (Múltiplas tentativas)
        run: |
          echo "Iniciando warm-up do CDN..."
          
          # Warm-up básico dos ficheiros principais
          for i in {1..3}; do
            echo "Tentativa de warm-up $i/3"
            
            curl -sS -I "https://ned-api-316f8.web.app/articles_priority.json?v=${{ env.TIMESTAMP }}" || true
            curl -sS -I "https://ned-api-316f8.web.app/articles_secondary.json?v=${{ env.TIMESTAMP }}" || true
            curl -sS -I "https://ned-api-316f8.web.app/articles.json?v=${{ env.TIMESTAMP }}" || true
            
            # Warm-up dos ficheiros principais sem parâmetros
            curl -sS -I "https://ned-api-316f8.web.app/articles_priority.json" || true
            curl -sS -I "https://ned-api-316f8.web.app/articles_secondary.json" || true
            curl -sS -I "https://ned-api-316f8.web.app/articles.json" || true
            
            # Pequena pausa entre tentativas
            if [ $i -lt 3 ]; then
              sleep 5
            fi
          done
          
          echo "Warm-up concluído"
      
      - name: Verificar propagação e disponibilidade
        run: |
          echo "Verificando disponibilidade dos ficheiros..."
          SUCCESS=0
          
          for i in {1..8}; do
            echo "Verificação $i/8..."
            
            # Verificar se os ficheiros estão acessíveis
            STATUS_PRIORITY=$(curl -sS -o /dev/null -w "%{http_code}" "https://ned-api-316f8.web.app/articles_priority.json" || echo "000")
            STATUS_SECONDARY=$(curl -sS -o /dev/null -w "%{http_code}" "https://ned-api-316f8.web.app/articles_secondary.json" || echo "000")
            STATUS_MAIN=$(curl -sS -o /dev/null -w "%{http_code}" "https://ned-api-316f8.web.app/articles.json" || echo "000")
            
            echo "Status codes: Priority=$STATUS_PRIORITY, Secondary=$STATUS_SECONDARY, Main=$STATUS_MAIN"
            
            if [ "$STATUS_PRIORITY" = "200" ] && [ "$STATUS_SECONDARY" = "200" ] && [ "$STATUS_MAIN" = "200" ]; then
              echo "✅ Todos os ficheiros estão disponíveis!"
              SUCCESS=1
              break
            else
              echo "⏳ Aguardando propagação... (tentativa $i/8)"
              sleep 15
            fi
          done
          
          if [ $SUCCESS -eq 0 ]; then
            echo "⚠️ Aviso: Alguns ficheiros podem ainda não estar totalmente propagados"
            echo "Isto é normal e a propagação deve completar-se nos próximos minutos"
          fi
      
      - name: Testar conteúdo dos ficheiros
        run: |
          echo "Testando conteúdo dos ficheiros JSON..."
          
          # Verificar se o conteúdo dos ficheiros é válido JSON
          echo "Testando articles_priority.json..."
          CONTENT=$(curl -sS "https://ned-api-316f8.web.app/articles_priority.json" | head -c 100)
          echo "Primeiros 100 caracteres: $CONTENT"
          
          echo "Testando articles_secondary.json..."
          CONTENT=$(curl -sS "https://ned-api-316f8.web.app/articles_secondary.json" | head -c 100)
          echo "Primeiros 100 caracteres: $CONTENT"
          
          echo "Testando articles.json..."
          CONTENT=$(curl -sS "https://ned-api-316f8.web.app/articles.json" | head -c 100)
          echo "Primeiros 100 caracteres: $CONTENT"
      
      - name: Limpeza de ficheiros temporários
        run: |
          echo "Removendo ficheiros temporários com timestamp..."
          cd public
          rm -f "articles_priority_${{ env.TIMESTAMP }}.json" || true
          rm -f "articles_secondary_${{ env.TIMESTAMP }}.json" || true
          rm -f "articles_${{ env.TIMESTAMP }}.json" || true
      
      - name: Resumo do deploy
        run: |
          echo "🚀 Deploy concluído com sucesso!"
          echo "📡 CDN warm-up executado"
          echo "✅ Verificação de disponibilidade realizada"
          echo "🔗 Site disponível em: https://ned-api-316f8.web.app"
          echo "⏰ Deploy finalizado às: $(date)"
          echo ""
          echo "URLs dos ficheiros:"
          echo "- https://ned-api-316f8.web.app/articles_priority.json"
          echo "- https://ned-api-316f8.web.app/articles_secondary.json"  
          echo "- https://ned-api-316f8.web.app/articles.json"