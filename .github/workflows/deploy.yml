name: Atualizar JSON de Notícias e Deploy Firebase
on:
  schedule:
    - cron: "*/15 * * * *"  # Executa a cada 15 minutos
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4
        
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Instalar dependências
        run: pip install -r requirements.txt
        
      - name: Executar script para atualizar JSON
        run: |
            export PYTHONPATH=$(pwd)
            python scripts/RSS_API.py
        
      - name: Copiar ficheiros JSON para pasta public
        run: |
          cp articles/articles.json public/articles.json
          cp articles/articles_priority.json public/articles_priority.json
          cp articles/articles_secondary.json public/articles_secondary.json
        
      #- name: Reset counts with backup
      #  run: python reset_counts_with_backup.py
      
      - name: Commit dos ficheiros atualizados
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/articles.json articles/articles_priority.json articles/articles_secondary.json articles/original_categories.json public/articles.json public/articles_priority.json public/articles_secondary.json
          git diff --cached --quiet || git commit -m "Atualização automática dos ficheiros JSON"
          git push --force origin main

  deploy-vercel:
    needs: update-json
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4
        
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Instalar Vercel CLI
        run: npm install -g vercel
        
      - name: Verificar ficheiros JSON
        run: |
          echo "Verificando ficheiros JSON gerados..."
          ls -la public/
          
          if [ -f "public/articles.json" ]; then
            echo "✅ articles.json encontrado ($(wc -c < public/articles.json) bytes)"
          else
            echo "❌ articles.json não encontrado!"
          fi
          
          if [ -f "public/articles_priority.json" ]; then
            echo "✅ articles_priority.json encontrado ($(wc -c < public/articles_priority.json) bytes)"
          else
            echo "❌ articles_priority.json não encontrado!"
          fi
          
          if [ -f "public/articles_secondary.json" ]; then
            echo "✅ articles_secondary.json encontrado ($(wc -c < public/articles_secondary.json) bytes)"
          else
            echo "❌ articles_secondary.json não encontrado!"
          fi
      
      - name: Deploy para Vercel
        env:
          VERCEL_ARTICLES: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Iniciando deploy para Vercel..."
          vercel --token="$VERCEL_TOKEN" --prod --yes
          
      - name: Aguardar propagação
        run: |
          echo "Aguardando propagação do Vercel..."
          sleep 10
      
      - name: Warm-up e verificação dos endpoints
        run: |
          echo "Fazendo warm-up dos endpoints..."
          
          # Obter URL do deployment (assumindo que segue o padrão)
          PROJECT_URL="https://${{ secrets.VERCEL_PROJECT_NAME }}.vercel.app"
          
          # Se não tiveres a variável VERCEL_PROJECT_NAME, usa o nome do repo
          if [ -z "${{ secrets.VERCEL_PROJECT_NAME }}" ]; then
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
            PROJECT_URL="https://${REPO_NAME}.vercel.app"
          fi
          
          echo "URL do projeto: $PROJECT_URL"
          
          # Warm-up dos endpoints
          for i in {1..3}; do
            echo "Tentativa de warm-up $i/3..."
            
            curl -sS -I "${PROJECT_URL}/articles.json" || echo "Erro ao aceder articles.json"
            curl -sS -I "${PROJECT_URL}/articles_priority.json" || echo "Erro ao aceder articles_priority.json"
            curl -sS -I "${PROJECT_URL}/articles_secondary.json" || echo "Erro ao aceder articles_secondary.json"
            
            sleep 5
          done
      
      - name: Verificar disponibilidade final
        run: |
          echo "Verificação final da disponibilidade..."
          
          # URL do projeto
          PROJECT_URL="https://${{ secrets.VERCEL_PROJECT_NAME }}.vercel.app"
          if [ -z "${{ secrets.VERCEL_PROJECT_NAME }}" ]; then
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
            PROJECT_URL="https://${REPO_NAME}.vercel.app"
          fi
          
          SUCCESS=0
          
          for i in {1..5}; do
            echo "Verificação $i/5..."
            
            STATUS_MAIN=$(curl -sS -o /dev/null -w "%{http_code}" "${PROJECT_URL}/articles.json" 2>/dev/null || echo "000")
            STATUS_PRIORITY=$(curl -sS -o /dev/null -w "%{http_code}" "${PROJECT_URL}/articles_priority.json" 2>/dev/null || echo "000")
            STATUS_SECONDARY=$(curl -sS -o /dev/null -w "%{http_code}" "${PROJECT_URL}/articles_secondary.json" 2>/dev/null || echo "000")
            
            echo "Status: Main=$STATUS_MAIN, Priority=$STATUS_PRIORITY, Secondary=$STATUS_SECONDARY"
            
            if [ "$STATUS_MAIN" = "200" ] && [ "$STATUS_PRIORITY" = "200" ] && [ "$STATUS_SECONDARY" = "200" ]; then
              echo "✅ Todos os endpoints estão funcionais!"
              SUCCESS=1
              break
            else
              echo "⏳ Aguardando... (tentativa $i/5)"
              sleep 10
            fi
          done
          
          if [ $SUCCESS -eq 1 ]; then
            echo "🎉 Deploy concluído com sucesso!"
            echo "📡 URLs disponíveis:"
            echo "  - ${PROJECT_URL}/articles.json"
            echo "  - ${PROJECT_URL}/articles_priority.json"
            echo "  - ${PROJECT_URL}/articles_secondary.json"
          else
            echo "⚠️ Alguns endpoints podem ainda estar a propagar..."
            echo "🔗 Verifica manualmente: $PROJECT_URL"
          fi
      
      - name: Teste de conteúdo JSON
        run: |
          echo "Testando conteúdo dos ficheiros..."
          
          PROJECT_URL="https://${{ secrets.VERCEL_PROJECT_NAME }}.vercel.app"
          if [ -z "${{ secrets.VERCEL_PROJECT_NAME }}" ]; then
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
            PROJECT_URL="https://${REPO_NAME}.vercel.app"
          fi
          
          # Testar se o JSON é válido
          echo "Testando articles.json..."
          RESPONSE=$(curl -sS "${PROJECT_URL}/articles.json" 2>/dev/null | head -c 200)
          echo "Primeiros 200 chars: $RESPONSE"
          
          echo "✅ Deploy do Vercel finalizado!"
          echo "⚡ Propagação muito mais rápida que Firebase!"
          echo "🕐 Tempo total estimado: 1-2 minutos"