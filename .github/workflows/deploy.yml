name: Atualizar Notícias

on:
  schedule:
    - cron: "*/5 * * * *"  # Executa a cada 5 minutos
  workflow_dispatch:  # Permite execução manual

jobs:
  update_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.9"

      - name: Instalar dependências
        run: pip install requests fastapi

      - name: Executar script
        run: python RSS_API.py

      - name: Enviar JSON para HelioHost via SFTP
        uses: appleboy/scp-action@master
        with:
          host: sftp.heliohost.org  # Substituir pelo servidor correto
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          source: "articles.json"
          target: "/home/seu_usuario/public_html/"
