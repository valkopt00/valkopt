name: Atualizar JSON de Notícias e Deploy Firebase

on:
  schedule:
    - cron: "*/15 * * * *"  # Executa a cada 15 minutos
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar script para atualizar JSON
        run: python RSS_API.py
        
      #- name: Reset counts with backup
      #  run: python reset_counts_with_backup.py

      - name: Commit dos JSONs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Adicionar articles.json para Firebase e manter original_categories.json na raiz
          git add public/articles.json original_categories.json
          git diff --cached --quiet || git commit -m "Atualização automática dos JSONs"
          git push --force origin main

  deploy-firebase:
    needs: update-json
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository with latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure public folder for hosting
        run: |
          # public/articles.json já gerado e commitado; garante que existe localmente
          ls -R .

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy para Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_DEPLOY_TOKEN }}
        run: |
          firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --token "$FIREBASE_TOKEN"
